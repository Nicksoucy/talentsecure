server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Security headers (O8 audit) — appliqués à toutes les réponses.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;
    # CSP — activée en Report-Only (ne BLOQUE rien, remonte seulement les
    # violations). MUI/emotion injectent des styles inline → 'unsafe-inline' style.
    # img/connect restent larges (https:) le temps d'observer les rapports, PUIS
    # on resserre connect-src vers l'origine API. Une fois les rapports propres,
    # renommer l'en-tête en "Content-Security-Policy" (enforce).
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https:;" always;

    # Cache static assets (noms de fichiers hashés = immuables)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # SPA routing - redirect all requests to index.html
    # O8 — index.html ne doit JAMAIS être mis en cache : sinon après un déploiement
    # un vieil index référence des chunks hashés disparus (écran blanc post-deploy).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;
        # nginx : un `add_header` dans un location N'HÉRITE PAS des add_header du
        # bloc server → on ré-applique ici la CSP pour qu'elle couvre index.html.
        add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https:;" always;
    }

    # Health check endpoint
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
