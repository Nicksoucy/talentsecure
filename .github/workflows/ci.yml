name: CI

on:
  push:
    branches: [main]
  pull_request:

# Annule les exécutions précédentes encore en cours sur la même réf.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (type-check + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: talentsecure_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Base de TEST jetable (le garde anti-prod de setup.ts l'accepte : localhost + *_test).
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/talentsecure_test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - name: Type-check
        run: npx tsc --noEmit
      - name: Architecture (dependency-cruiser — pas de cycles)
        run: npm run depcruise
      - name: Routes mutantes validées (garde P2-A)
        run: npm run check:routes
      - name: Enveloppe d'erreur — plafond ratchet (garde P2-B)
        run: npm run check:errors
      - name: Lint (bloquant)
        run: npm run lint
      - name: Préparer la base de test
        # db push (jamais migrate deploy) + colonne générée searchText (hors schema.prisma).
        run: |
          npx prisma db push --skip-generate --force-reset
          npx prisma db execute --file prisma/migrations/20260620000000_add_search_text/migration.sql --schema prisma/schema.prisma
      - name: Tests (+ seuils de couverture)
        run: npm run test:coverage

  frontend:
    name: Frontend (type-check + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Type-check
        run: npm run type-check
      - name: Lint (informatif)
        run: npm run lint
        continue-on-error: true
      - name: Tests
        run: npm test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Installer Chromium
        run: npx playwright install --with-deps chromium
      - name: Tests E2E
        run: npm run e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # Job de synthèse = SEUL status check à exiger dans la branch protection.
  ci-success:
    name: CI success
    runs-on: ubuntu-latest
    needs: [backend, frontend, e2e]
    if: always()
    steps:
      - name: Vérifier les jobs requis
        run: |
          if [ "${{ needs.backend.result }}" != "success" ] || [ "${{ needs.frontend.result }}" != "success" ] || [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "Un job requis a échoué (backend=${{ needs.backend.result }}, frontend=${{ needs.frontend.result }}, e2e=${{ needs.e2e.result }})."
            exit 1
          fi
          echo "Tous les checks requis sont verts."
