steps:
  # Install dependencies (cached node_modules used by both test + image steps later)
  - name: 'node:20-alpine'
    entrypoint: 'npm'
    args: ['ci', '--prefer-offline', '--no-audit', '--no-fund']
    dir: 'backend'
    id: 'npm-ci'

  # Generate Prisma client so tests that transitively import @prisma/client can resolve it
  - name: 'node:20-alpine'
    entrypoint: 'npx'
    args: ['prisma', 'generate']
    dir: 'backend'
    id: 'prisma-generate'
    waitFor: ['npm-ci']

  # Run unit tests that don't require a live Postgres (env validator, rate-limit,
  # token util, skill normalization, ai-extraction). DB-dependent tests are
  # skipped for now — wiring them in CI requires a postgres service container,
  # tracked for Sprint 5+.
  - name: 'node:20-alpine'
    entrypoint: 'npm'
    args: ['run', 'test:ci']
    dir: 'backend'
    id: 'unit-tests'
    waitFor: ['prisma-generate']

  # Build the container image — only after tests have passed
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--no-cache'
      - '-t'
      - 'northamerica-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/talentsecure-backend:$COMMIT_SHA'
      - '-f'
      - 'backend/Dockerfile'
      - './backend'
    id: 'build-image'
    waitFor: ['unit-tests']

  # Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'northamerica-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/talentsecure-backend:$COMMIT_SHA'
    id: 'push-image'

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'talentsecure-backend'
      - '--image'
      - 'northamerica-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/talentsecure-backend:$COMMIT_SHA'
      - '--region'
      - 'northamerica-northeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      # V2 — min-instances=1 nécessaire pour faire tourner node-cron (scheduler)
      # in-process : sans cela Cloud Run scale-down détruit les jobs.
      - '--min-instances=1'
      # V2 — destinataires email pour les notifications (RH, paie, fin d'emploi, etc.)
      # Non-sensibles : on les met en clair via --update-env-vars (préserve les autres envs).
      - '--update-env-vars=EMAIL_RH=rh@xguard.ca,EMAIL_PAIE=paie@xguard.ca'
    id: 'deploy-service'

images:
  - 'northamerica-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/talentsecure-backend:$COMMIT_SHA'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
