steps:
  # Install dependencies (cached node_modules used by both test + image steps later)
  - name: 'node:20-alpine'
    entrypoint: 'npm'
    args: ['ci', '--prefer-offline', '--no-audit', '--no-fund']
    dir: 'backend'
    id: 'npm-ci'

  # Generate Prisma client so tests that transitively import @prisma/client can resolve it
  - name: 'node:20-alpine'
    entrypoint: 'npx'
    args: ['prisma', 'generate']
    dir: 'backend'
    id: 'prisma-generate'
    waitFor: ['npm-ci']

  # Postgres éphémère sur le réseau Cloud Build : permet d'exécuter la suite
  # COMPLÈTE (intégration HTTP+DB) plutôt qu'un sous-ensemble. Le garde anti-prod
  # de src/__tests__/setup.ts accepte l'URL *_test ci-dessous.
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'run'
      - '-d'
      - '--network=cloudbuild'
      - '--name=tspg'
      - '-e'
      - 'POSTGRES_USER=postgres'
      - '-e'
      - 'POSTGRES_PASSWORD=postgres'
      - '-e'
      - 'POSTGRES_DB=talentsecure_test'
      - 'postgres:16'
    id: 'start-postgres'
    waitFor: ['npm-ci']

  # Suite de tests COMPLÈTE (= le même `npm test` que la CI GitHub). Le déploiement
  # n'est atteint QUE si elle passe : la porte de déploiement = la porte de merge.
  - name: 'node:20-alpine'
    entrypoint: 'sh'
    args:
      - '-c'
      - >-
        until node -e "require('net').connect(5432,'tspg').on('connect',function(){process.exit(0)}).on('error',function(){process.exit(1)})" 2>/dev/null; do echo "waiting for postgres..."; sleep 1; done &&
        npx prisma db push --skip-generate --force-reset &&
        npx prisma db execute --file prisma/migrations/20260620000000_add_search_text/migration.sql --schema prisma/schema.prisma &&
        npm test
    dir: 'backend'
    env:
      - 'DATABASE_URL=postgresql://postgres:postgres@tspg:5432/talentsecure_test'
    id: 'tests'
    waitFor: ['prisma-generate', 'start-postgres']

  # Build the container image — only after the FULL suite has passed
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--no-cache'
      - '-t'
      - 'northamerica-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/talentsecure-backend:$COMMIT_SHA'
      - '-f'
      - 'backend/Dockerfile'
      - './backend'
    id: 'build-image'
    waitFor: ['tests']

  # Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'northamerica-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/talentsecure-backend:$COMMIT_SHA'
    id: 'push-image'

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'talentsecure-backend'
      - '--image'
      - 'northamerica-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/talentsecure-backend:$COMMIT_SHA'
      - '--region'
      - 'northamerica-northeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      # V2 — min-instances=1 nécessaire pour faire tourner node-cron (scheduler)
      # in-process : sans cela Cloud Run scale-down détruit les jobs.
      - '--min-instances=1'
      # O3 — réglages de capacité explicites (avant : valeurs par défaut) :
      #  - memory 1Gi (def. 512Mi) : marge pour exports CSV/ZIP + génération PDF.
      #  - cpu 1 : explicite.
      #  - concurrency 40 (def. 80) : réduit la pression sur le pool de connexions Neon.
      #  - max-instances 10 : plafonne le scaling (coût + connexions DB).
      #  - timeout 600s (def. 300s) : aligne sur les exports longs (ZIP CV, PDF catalogue).
      - '--memory=1Gi'
      - '--cpu=1'
      - '--concurrency=40'
      - '--max-instances=10'
      - '--timeout=600'
      # V2 — destinataires email + identifiants GHL NON secrets (location, survey).
      # --update-env-vars préserve les autres envs ET les secrets liés hors-band.
      - '--update-env-vars=EMAIL_RH=rh@xguard.ca,EMAIL_PAIE=paie@xguard.ca,EMAIL_PROVIDER=ghl,GHL_LOCATION_ID=dfkLurZY2ADWAUZl4zYc,GHL_SURVEY_ID=7R37monCgHPJyTiinjn3'
      # SECRETS GHL — liés via Secret Manager (O6). À exécuter UNE FOIS, hors de ce
      # build (le secret doit exister avant ; --update-env-vars ci-dessus le préserve) :
      #   gcloud run services update talentsecure-backend --region=northamerica-northeast1 \
      #     --update-secrets=GHL_PIT_TOKEN=GHL_PIT_TOKEN:latest,GOHIGHLEVEL_WEBHOOK_SECRET=GOHIGHLEVEL_WEBHOOK_SECRET:latest
    id: 'deploy-service'

images:
  - 'northamerica-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/talentsecure-backend:$COMMIT_SHA'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
